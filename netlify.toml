# Netlify build configuration for the Hugo portfolio site.
# This file lives at the repository root and overrides settings configured in the Netlify UI.

[build]
  # The Hugo project lives in the `portfolio_site/` subdirectory.
  base    = "portfolio_site"
  publish = "public"
  command = "hugo --gc --minify"

[build.environment]
  # Pin Hugo to the same version used locally so builds are byte-for-byte
  # reproducible between the developer machine and Netlify.
  # The theme-default 0.92.0 (2022) was missing modern template syntax, and
  # 0.140.2 (Dec 2024) predates the `twitter` -> `x` shortcode rename
  # (Hugo 0.141.0, Jan 2025) used in content/blogs/rich-content.md.
  HUGO_VERSION       = "0.161.1"
  HUGO_ENV           = "production"
  HUGO_ENABLEGITINFO = "true"
  TZ                 = "America/Toronto"

# Deploy previews (pull requests): point Hugo at the preview URL.
[context.deploy-preview]
  command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.deploy-preview.environment]
  HUGO_VERSION = "0.161.1"

# Branch deploys behave the same way.
[context.branch-deploy]
  command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

[context.branch-deploy.environment]
  HUGO_VERSION = "0.161.1"

# ---------------------------------------------------------------------------
# Caching strategy
#
# Hugo here does NOT fingerprint /css and /js filenames, so we MUST allow
# the browser to revalidate them — otherwise a returning visitor is stuck
# on whatever version they cached, even after a fresh deploy. We use a
# short max-age plus stale-while-revalidate for a responsive feel.
#
# Versioned vendor directories (bootstrap-5, fontawesome-5) already carry
# the major version in the path, so they're safe to cache aggressively.
# ---------------------------------------------------------------------------

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=600, stale-while-revalidate=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=600, stale-while-revalidate=86400"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/fontawesome-5/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/bootstrap-5/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ---------------------------------------------------------------------------
# Security headers applied to every response.
# ---------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
